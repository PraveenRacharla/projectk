<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Budget Dashboard</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>Budget</h1>
      <div class="sub" id="todayLabel"></div>
    </div>
    <div class="icon-btn" id="clearBtn" title="Reset all data">&#8635;</div>
  </header>

  <div class="hero">
    <div class="label">Total spent</div>
    <div class="amount" id="totalAmount">0<span>NOK</span></div>
    <div class="meta-row">
      <div class="meta">This month<b id="monthAmount">0 NOK</b></div>
      <div class="meta">Transactions<b id="txCount">0</b></div>
      <div class="meta">Top category<b id="topCat">—</b></div>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-view="overview">Overview</div>
    <div class="tab" data-view="trend">Trend</div>
    <div class="tab" data-view="history">History</div>
  </div>

  <div id="view-overview">
    <div class="card">
      <h3>Spending by category</h3>
      <div id="pieEmpty" class="empty">Add an expense to see your breakdown</div>
      <div id="pieBox" style="display:none;">
        <div class="donut-wrap">
          <canvas id="pieChart" role="img" aria-label="Donut chart of spending by category"></canvas>
          <div class="donut-center" id="donutCenter">
            <div class="donut-center-label">Total</div>
            <div class="donut-center-amount" id="donutTotal"></div>
          </div>
        </div>
        <div class="cat-breakdown" id="catBreakdown"></div>
      </div>
    </div>
  </div>

  <div id="view-trend" style="display:none;">
    <div class="card">
      <h3>Last 7 days</h3>
      <div class="chart-box" style="height:200px;">
        <canvas id="trendChart" role="img" aria-label="Bar chart of daily spending over the last 7 days"></canvas>
      </div>
    </div>
  </div>

  <div id="view-history" style="display:none;">
    <div class="card">
      <h3>Recent transactions</h3>
      <div id="txEmpty" class="empty">No transactions yet</div>
      <div class="tx-list" id="txList"></div>
    </div>
  </div>
</div>

<button class="fab" id="addFab" aria-label="Add expense">+</button>

<div class="sheet-overlay" id="sheetOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h3>Add expense</h3>
    <div class="row2">
      <div class="field">
        <label for="date">Date</label>
        <input id="date" type="date" />
      </div>
      <div class="field">
        <label for="amount">Amount (NOK)</label>
        <input id="amount" type="number" placeholder="0" inputmode="decimal" />
      </div>
    </div>
    <div class="field">
      <label for="category">Category</label>
      <select id="category">
        <option>Food</option>
        <option>Rent</option>
        <option>Transport</option>
        <option>Shopping</option>
        <option>Bills</option>
        <option>Entertainment</option>
        <option>Health</option>
        <option>Other</option>
      </select>
    </div>
    <div class="field">
      <label for="note">Note (optional)</label>
      <input id="note" type="text" placeholder="e.g. Groceries at Rema" />
    </div>
    <div class="sheet-actions">
      <button class="btn btn-ghost" id="cancelBtn">Cancel</button>
      <button class="btn btn-primary" id="saveBtn">Add expense</button>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="script.js"></script>
</body>
</html>
